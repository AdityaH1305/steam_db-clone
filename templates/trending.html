{% extends "base.html" %}
{% block title %}Trending Games — SteamDB Clone{% endblock %}

{% block content %}
<div class="wrap">
  <h1 style="font-family:var(--font-display);margin-bottom:6px;">🔥 Trending Games</h1>
  <p style="color:var(--muted);margin-bottom:20px;">
    Popular games on Steam right now — ranked by community activity.
  </p>

  <div class="trending-grid" id="trending-grid">
    <!-- Skeleton loaders -->
    <div class="skeleton skeleton-card" style="height:280px;"></div>
    <div class="skeleton skeleton-card" style="height:280px;"></div>
    <div class="skeleton skeleton-card" style="height:280px;"></div>
    <div class="skeleton skeleton-card" style="height:280px;"></div>
    <div class="skeleton skeleton-card" style="height:280px;"></div>
    <div class="skeleton skeleton-card" style="height:280px;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const grid = document.getElementById('trending-grid');

  cachedFetch('/api/trending')
    .then(items => {
      if (!items.length) {
        grid.innerHTML = '<p style="color:var(--muted);">No trending data available.</p>';
        return;
      }
      grid.innerHTML = items.map((g, i) => `
        <a href="/game/${g.appid}" class="trending-card" style="text-decoration:none;color:inherit;">
          <div class="trending-cover">
            <img src="${g.cover}" alt="${escapeHtml(g.name)}"
                 onerror="this.src='https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appid}/header.jpg'">
            <div class="trending-rank">#${i + 1}</div>
          </div>
          <div class="trending-meta">
            <div class="trending-name">${escapeHtml(g.name)}</div>
            <div class="trending-desc">${escapeHtml(g.short_description || '')}</div>
            <div class="trending-tags">
              ${(g.genres || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
            </div>
            <div class="trending-price">${escapeHtml(g.price)}</div>
          </div>
        </a>
      `).join('');
    })
    .catch(() => {
      grid.innerHTML = '<p style="color:var(--muted);">Failed to load trending games.</p>';
    });
</script>
{% endblock %}
