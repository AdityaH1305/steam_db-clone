<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PlaySutra — Explore Steam game prices, value scores, vibes, and analytics.">
  <title>{% block title %}PlaySutra{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>

<body class="page-bg">
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span>🎮</span>
        <span>Play<span class="accent">Sutra</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Search</a>
        <a href="/trending" class="nav-link {% if request.path == '/trending' %}active{% endif %}">🔥 Trending</a>
        <a href="/moods" class="nav-link {% if request.path == '/moods' %}active{% endif %}">🧠 Vibes</a>
        <a href="/compare" class="nav-link {% if request.path == '/compare' %}active{% endif %}">
          🆚 Compare
          <span id="compare-count" class="badge"
            style="display:none;font-size:11px;padding:2px 6px;margin-left:2px;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    Built with Flask & Steam API · <a href="https://store.steampowered.com" target="_blank" rel="noopener">Steam
      Store</a>
    · Press <kbd>/</kbd> to search
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
